name: Hourly Appwrite Sync

on:
  schedule:
    - cron: "11 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types:
      - external-hourly-sync

concurrency:
  group: appwrite-sync-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Export Appwrite data
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_DATABASE_ID: ${{ secrets.APPWRITE_DATABASE_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: python scripts/fetch_appwrite_backup.py

      - name: Commit updated backup files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --porcelain -- data/appwrite)" ]; then
            echo "No backup changes detected."
            exit 0
          fi

          git add data/appwrite
          git commit -m "chore: update appwrite backup"
          git push
